<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 달력</title>
    <style>
        /* 기본 스타일 리셋 및 배경 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 달력 컨테이너 */
        .calendar-container {
            background: #ffffff;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* 달력 헤더 (연도, 월, 이동 버튼) */
        .calendar-header {
            background: #4a90e2;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .calendar-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 달력 본문 구조 */
        .calendar-body {
            padding: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        /* 일요일 빨간색, 토요일 파란색 포인트 */
        .weekdays div:nth-child(1) { color: #e74c3c; }
        .weekdays div:nth-child(7) { color: #3498db; }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            row-gap: 12px;
        }

        .days div {
            padding: 10px 0;
            font-size: 0.95rem;
            color: #2c3e50;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            width: 40px;
            height: 40px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 빈 칸이나 다른 기능용 마우스 오버 효과 */
        .days div:hover:not(.empty) {
            background: #e8f2fe;
        }

        /* 빈 칸 처리 */
        .days .empty {
            cursor: default;
        }

        /* 오늘 날짜 하이라이트 */
        .days .today {
            background: #4a90e2;
            color: white !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <!-- 헤더 영역 -->
        <div class="calendar-header">
            <button class="nav-btn" id="prevMonth">&lt;</button>
            <h2 id="monthYearTitle">2026년 5월</h2>
            <button class="nav-btn" id="nextMonth">&gt;</button>
        </div>

        <!-- 본문 영역 -->
        <div class="calendar-body">
            <!-- 요일 표시 -->
            <div class="weekdays">
                <div>일</div>
                <div>월</div>
                <div>화</div>
                <div>수</div>
                <div>목</div>
                <div>금</div>
                <div>토</div>
            </div>
            <!-- 날짜가 주입될 공간 -->
            <div class="days" id="calendarDays"></div>
        </div>
    </div>

    <script>
        // 현재 날짜 기준 데이터 객체 생성
        const date = new Date();
        let currentYear = date.getFullYear();
        let currentMonth = date.getMonth(); // 0 = 1월, 11 = 12월

        const monthYearTitle = document.getElementById('monthYearTitle');
        const calendarDays = document.getElementById('calendarDays');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');

        // 달력을 그리는 메인 함수
        function renderCalendar() {
            // 1. 헤더 제목 업데이트
            monthYearTitle.innerText = `${currentYear}년 ${currentMonth + 1}월`;

            // 2. 이번 달의 첫 번째 날 요일 확인 (0: 일요일 ~ 6: 토요일)
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();

            // 3. 이번 달의 마지막 날짜 확인 (ex: 30일, 31일)
            const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate();

            // 4. 날짜 영역 초기화
            calendarDays.innerHTML = '';

            // 5. 첫 번째 날이 시작하기 전까지 빈 칸 채우기
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.classList.add('empty');
                calendarDays.appendChild(emptyDiv);
            }

            // 6. 실제 날짜 채우기
            const today = new Date();
            for (let day = 1; day <= lastDay; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.innerText = day;

                // 오늘 날짜인지 체크하여 하이라이트 클래스 추가
                if (
                    day === today.getDate() &&
                    currentMonth === today.getMonth() &&
                    currentYear === today.getFullYear()
                ) {
                    dayDiv.classList.add('today');
                }

                calendarDays.appendChild(dayDiv);
            }
        }

        // 이전 달 이동 이벤트
        prevMonthBtn.addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        });

        // 다음 달 이동 이벤트
        nextMonthBtn.addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        });

        // 페이지 최초 로드시 달력 실행
        renderCalendar();
    </script>
</body>
</html>
